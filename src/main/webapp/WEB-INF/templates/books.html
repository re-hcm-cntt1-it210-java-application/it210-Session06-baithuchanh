<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <meta charset="UTF-8">
    <title>Danh sách books</title>
</head>
<body>
    <div th:replace="fragments/header :: header(${title})"></div>
    <table border="1">
        <tr>
            <th>ID</th>
            <th>Tên</th>
            <th>Giá</th>
            <th>Action</th>
        </tr>

        <tr th:each="b : ${books}"
            th:class="${b.price >= 300000} ? 'highlight' : ''">
            <td th:text="${b.id}"></td>
            <td th:text="${b.name}"></td>
            <td th:text="${b.price}"></td>
            <td>
                <a th:href="@{/books/{id}(id=${b.id})}">Xem</a>
            </td>
        </tr>
    </table>

    <div th:fragment="footer"></div>
</body>
</html>
