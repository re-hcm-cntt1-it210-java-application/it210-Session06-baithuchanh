<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div th:replace="fragments/header :: header(${title})"></div>
  <h2 th:text="${book.name}"></h2>
  <p>Tác giả: <span th:text="${book.author}"></span></p>
  <p>Giá: <span th:text="${book.price}"></span></p>

  <a th:href="@{/books}">Quay lại</a>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
